<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI UX Auditor - Multi-Report Hub</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .report-layout { display: grid; grid-template-columns: 1fr 3fr; gap: 2rem; }
        .report-menu { display: flex; flex-direction: column; gap: 0.5rem; }
        .menu-btn { text-align: left; padding: 1rem; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-md); font-weight: 600; cursor: pointer; transition: var(--transition); }
        .menu-btn:hover, .menu-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }
        .report-content-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 2.5rem; box-shadow: var(--shadow-md); }
        .report-header-block { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid var(--bg-primary); padding-bottom: 1rem; margin-bottom: 1.5rem; }
        .markdown-preview { color: var(--text-secondary); font-size: 1rem; line-height: 1.7; }
        .markdown-preview h4 { color: var(--text-primary); font-size: 1.15rem; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .markdown-preview ul { margin-left: 1.5rem; margin-top: 0.5rem; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-container">✨ AI UX Auditor</div>
        <div class="nav-links">
            <a href="index.html">Initialization</a>
            <a href="dashboard.html">Live Workspace</a>
            <a href="findings.html">UX Intelligence</a>
            <a href="reports.html" class="active">Reports</a>
            <a href="retest.html">Auto Re-Test</a>
        </div>
    </nav>

    <div class="container">
        <h2>Specialized Report Matrix Engine</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Tailored, role-specific documentation arrays generated by the Report Agent.</p>

        <div class="report-layout">
            <div class="report-menu">
                <button class="menu-btn active" onclick="switchReport('executive')">👔 Executive Summary</button>
                <button class="menu-btn" onclick="switchReport('ux')">🎨 Product UX Design Report</button>
                <button class="menu-btn" onclick="switchReport('technical')">💻 Technical Architecture File</button>
                <button class="menu-btn" onclick="switchReport('accessibility')">♿ Accessibility Compliance Log</button>
            </div>

            <div class="report-content-card">
                <div class="report-header-block">
                    <div>
                        <h3 id="reportTitle" style="font-size:1.5rem; color:var(--text-primary);">Executive Summary</h3>
                        <span id="reportSubtitle" style="font-size:0.85rem; color:var(--text-muted); font-weight:bold;">TARGET AUDIENCE: PRODUCT LEADERSHIP & MANAGEMENT</span>
                    </div>
                    <button class="btn btn-primary" onclick="alert('Exporting localized data payload structure to PDF format.')">📥 Export Report</button>
                </div>

                <div class="markdown-preview" id="reportPreview">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const library = {
            executive: {
                title: "Executive Summary",
                sub: "TARGET AUDIENCE: PRODUCT LEADERSHIP & MANAGEMENT",
                md: `<h4>High-Level Performance Strategy</h4>
                     <p>The automated testing pipeline exposed severe friction thresholds during conversion flows. While functional uptime remains within parameters, path efficiency benchmarks dropped significantly due to cognitive user blockages.</p>
                     <h4>Core Financial Implications</h4>
                     <ul>
                        <li><strong>Conversion Traps:</strong> 38% of simulated sessions experienced structural redirection errors during checkout execution.</li>
                        <li><strong>Remediation Strategy:</strong> Deploying the suggested AI UI layout fixes will stabilize baseline operations and increase overall conversion efficiency.</li>
                     </ul>`
            },
            ux: {
                title: "Product UX Design Report",
                sub: "TARGET AUDIENCE: INTERFACE DESIGNERS & RESEARCHERS",
                md: `<h4>Heuristic Evaluation Metrics</h4>
                     <p>An objective review using Nielsen Heuristics identifies significant violations regarding system status clarity and consistency models.</p>
                     <h4>Friction Traces Found</h4>
                     <ul>
                        <li><strong>Visual Misalignment:</strong> Primary buttons do not maintain standard placement patterns across different viewports.</li>
                        <li><strong>Form Density Hurdles:</strong> Lack of field inline validation forces repetitive correction passes.</li>
                     </ul>`
            },
            technical: {
                title: "Technical Architecture File",
                sub: "TARGET AUDIENCE: FRONTEND ENGINEERS & ARCHITECTS",
                md: `<h4>DOM Engineering Analysis</h4>
                     <p>Analysis of the DOM reveals poor semantic element structures causing layout shifts and rendering latency.</p>
                     <h4>Suggested Refactoring Steps</h4>
                     <ul>
                        <li><strong>Inline Style Cleanup:</strong> Move critical element sizes into external stylesheets.</li>
                        <li><strong>Dynamic Labels:</strong> Inject strict explicit element attributes to accelerate browser rendering loops.</li>
                     </ul>`
            },
            accessibility: {
                title: "Accessibility Compliance Log",
                sub: "TARGET AUDIENCE: COMPLIANCE LABS & LEGAL ENGINES",
                md: `<h4>WCAG 2.1 AA Enforcement Verification</h4>
                     <p>Automated evaluation profiles identified multiple non-compliant elements that present accessibility challenges.</p>
                     <h4>Identified Critical Paths</h4>
                     <ul>
                        <li><strong>Contrast Errors:</strong> Text contrast ratios fail minimum legibility requirements on key forms.</li>
                        <li><strong>Focus Traps:</strong> Complex modal layouts prevent users from navigating efficiently using keyboard controls.</li>
                     </ul>`
            }
        };

        function switchReport(key) {
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            const doc = library[key];
            document.getElementById('reportTitle').innerText = doc.title;
            document.getElementById('reportSubtitle').innerText = doc.sub;
            document.getElementById('reportPreview').innerHTML = doc.md;
        }

        // Initialize default view configuration
        switchReport('executive');
    </script>
    <script src="js/journey.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
