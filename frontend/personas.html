<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI UX Auditor - Persona Generation Layer</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .persona-matrix { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
        .persona-card { border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.5rem; background: var(--bg-secondary); box-shadow: var(--shadow-sm); transition: var(--transition); }
        .persona-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .p-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.75rem; }
        .p-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--accent-glow); color: var(--accent-color); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; }
        .trait-list { list-style: none; padding: 0; margin-top: 0.75rem; }
        .trait-list li { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.4rem; display: flex; align-items: center; gap: 0.5rem; }
        .trait-list li::before { content: "•"; color: var(--accent-color); font-weight: bold; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-container">✨ AI UX Auditor</div>
        <div class="nav-links">
            <a href="index.html">Initialization</a>
            <a href="dashboard.html">Live Workspace</a>
            <a href="personas.html" class="active">Personas</a>
            <a href="findings.html">UX Intelligence</a>
            <a href="fixes.html">AI Code Fixes</a>
            <a href="retest.html">Auto Re-Test</a>
        </div>
    </nav>

    <div class="container">
        <h2>Synthetic Persona Generation Matrix</h2>
        <p style="color: var(--text-secondary);">Independent testing instances generated by the Persona Manager Agent to cross-inspect user environments.</p>

        <div class="persona-matrix" id="personaMatrix">
            </div>
    </div>

    <script>
        async function loadPersonas() {
            const res = await fetch('http://127.0.0.1:8000/api/audit/latest');
            const data = await res.json();
            const matrix = document.getElementById('personaMatrix');
            
            const personas = data.personas || [
                { name: "First-Time User", focus: "Struggles with dynamic onboarding setups", traits: ["High intent, low friction tolerance", "Confused by multi-step inputs", "Expects inline validation cues"] },
                { name: "Elderly User", focus: "Readability metrics and low-contrast elements", traits: ["Needs 16px+ base typography", "Dependent on high text-contrast", "Requires prominent confirmation signals"] },
                { name: "Mobile Consumer", focus: "Viewport constraint structural rendering flaws", traits: ["Strict touch-target requirements", "Highly sensitive to layout shifts", "Vulnerable to intrusive layouts"] },
                { name: "Accessibility User", focus: "Deviations from logical keyboard DOM layouts", traits: ["Strict tab-navigation reliance", "Depends on explicit ARIA labels", "Vulnerable to focus containment traps"] }
            ];

            matrix.innerHTML = '';
            personas.forEach(p => {
                const initial = p.name.charAt(0);
                let traitsHTML = '';
                if (p.traits) {
                    p.traits.forEach(t => { traitsHTML += `<li>${t}</li>`; });
                } else {
                    traitsHTML = `<li>${p.focus}</li><li>Evaluating operational pipeline rules</li>`;
                }

                matrix.innerHTML += `
                    <div class="persona-card">
                        <div class="p-header">
                            <div class="p-avatar">${initial}</div>
                            <div>
                                <h3 style="font-size:1.15rem; color:var(--text-primary);">${p.name}</h3>
                                <span style="font-size:0.75rem; color:var(--accent-color); font-weight:600; text-transform:uppercase;">Active Profile</span>
                            </div>
                        </div>
                        <p style="font-size:0.9rem; color:var(--text-primary); font-weight:600;">Core Focus Vector:</p>
                        <p style="font-size:0.9rem; color:var(--text-secondary); margin-bottom:0.5rem;">${p.focus}</p>
                        <ul class="trait-list">${traitsHTML}</ul>
                    </div>`;
            });
        }
        loadPersonas();
    </script>
    <script src="js/api.js"></script>
    <script src="js/personas.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
