<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI UX Auditor - Conversational Assistant</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .chat-frame { max-width: 800px; margin: 2rem auto; display: flex; flex-direction: column; height: 550px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); overflow: hidden; }
        .chat-body { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; background: var(--bg-primary); }
        .message { max-width: 75%; padding: 1rem; border-radius: var(--radius-md); font-size: 0.95rem; line-height: 1.4; }
        .message.system { background: var(--accent-color); color: white; align-self: flex-start; border-bottom-left-radius: var(--radius-sm); }
        .message.user { background: var(--border-color); color: var(--text-primary); align-self: flex-end; border-bottom-right-radius: var(--radius-sm); }
        .chat-footer { padding: 1rem; background: var(--bg-secondary); border-top: 1px solid var(--border-color); display: flex; gap: 1rem; }
        .chat-input { flex: 1; padding: 0.75rem 1rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-size: 1rem; }
        .chat-input:focus { outline: none; border-color: var(--accent-color); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-container">✨ AI UX Auditor</div>
        <div class="nav-links">
            <a href="index.html">Initialization</a>
            <a href="dashboard.html">Live Workspace</a>
            <a href="findings.html">UX Intelligence</a>
            <a href="chat.html" class="active">UX Copilot</a>
        </div>
    </nav>

    <div class="container">
        <div class="chat-frame">
            <div class="chat-body" id="chatBody">
                <div class="message system">
                    Hello, I am your Conversational UX Assistant. I have indexed the latest audit logs, WCAG accessibility violations, and friction matrices. Ask me anything about the findings.
                </div>
            </div>
            <div class="chat-footer">
                <input type="text" id="userInput" class="chat-input" placeholder="e.g., 'Why is the checkout button issue marked as critical?'" onkeypress="if(event.key === 'Enter') sendMessage()">
                <button class="btn btn-primary" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text) return;

            const body = document.getElementById('chatBody');
            
            // Append User Query Bubble
            body.innerHTML += `<div class="message user">${text}</div>`;
            input.value = '';
            body.scrollTop = body.scrollHeight;

            // Simple rule-based mock engine matching Phase 10 questions
            setTimeout(() => {
                let reply = "I am analyzing the local audit run logs to resolve that query. Let me review the agent data structures.";
                const query = text.toLowerCase();
                
                if(query.includes('critical')) {
                    reply = "The checkout button issue is flagged as <strong>Critical</strong> because it occurs directly along the transaction path. According to the Severity Scoring Agent formula, its high frequency coupled with low color-contrast blocks standard completion tasks.";
                } else if(query.includes('accessibility') || query.includes('wcag')) {
                    reply = "The Accessibility Agent caught 1 primary infraction: The contrast ratio on the primary CTA dropped to 2.1:1, failing WCAG 2.1 AA legibility targets.";
                } else if(query.includes('conversion') || query.includes('friction')) {
                    reply = "The Friction Detection Agent identified that users clicked auxiliary elements 4 times before successfully locating the payment option. Moving this above the layout fold line is expected to optimize conversion rates.";
                }

                body.innerHTML += `<div class="message system">${reply}</div>`;
                body.scrollTop = body.scrollHeight;
            }, 750);
        }
    </script>
</body>
</html>
